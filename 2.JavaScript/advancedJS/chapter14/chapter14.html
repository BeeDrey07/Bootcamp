<!--DOCTYPE html>
<html>

<body>
    <input type="file" onchange="uploadAndReadFile(this.files)" />
    <div id="message"></div>
    <script>
        let message = document.getElementById("message");
        function uploadAndReadFile(files) {
            let fr = new FileReader();
            fr.onload = function (e) {
                message.innerHTML = e.target.result;
            };
            fr.readAsText(files[0]);
        }
    </script>
</body>

</html-->

<!--DOCTYPE html>
<html>

<head>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <script>
        window.onload = init;
        var canvas = document.getElementById("canvas");
        var ctx = canvas.getContext("2d");
        canvas.height = 500;
        canvas.width = 500;
        var pos = {
            x: 0,
            y: 50,
        };
        function init() {
            draw();
        }
        function draw() {
            pos.x = pos.x + 5;
            if (pos.x > canvas.width) {
                pos.x = 0;
            }
            if (pos.y > canvas.height) {
                pos.y = 0;
            }
            ctx.fillRect(pos.x, pos.y, 100, 100);
            window.setTimeout(draw, 50);
        }
    </script>
</body>

</html-->

<!--DOCTYPE html>
<html>

<head>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <input type="color" id="bgColor" />
    <script>

        let bgColor = "pink";
        let bgC = document.getElementById("bgColor");
        bgC.addEventListener("change", function () {
            bgColor = event.target.value;
        });

        let canvas = document.getElementById("canvas");
        let ctx = canvas.getContext("2d");
        canvas.width = 700;
        canvas.height = 700;
        window.onload = init; // add this line to the start of the script

        function init() {
            canvas.addEventListener("mousemove", draw);
            canvas.addEventListener("mousemove", setPosition);
            canvas.addEventListener("mouseenter", setPosition);

        }

        let pos = {
            x: 0,
            y: 0,
        };

        function setPosition(e) {
            pos.x = e.pageX;
            pos.y = e.pageY;
        }
        function draw(e) {
            if (e.buttons !== 1) return;
            ctx.strokeStyle = bgColor
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            setPosition(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.lineWidth = 10;
            ctx.lineCap = "round";
            ctx.stroke();
        }


    </script>

</body>

</html-->

<!--doctype html>
<html>

<head>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <input type="color" id="squareColor" />
    <br>
    <img src="" width="200" height="200" id="holder" />
    <input type="button" id="save" value="save" />
    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = 200;
        canvas.height = 200;
        const penColor = document.getElementById("squareColor");
        penColor.addEventListener("change", function () {
            color = event.target.value;
            draw(color);
        });
        document.getElementById("save").addEventListener("click",
            function () {
                let dataURL = canvas.toDataURL();
                document.getElementById("holder").src = dataURL;
            });
        function draw(color) {
            ctx.fillStyle = color;
            ctx.fillRect(70, 70, 100, 100);
        }
    </script>
</body>

</html-->
